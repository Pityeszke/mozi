<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmi online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1 class="logo">Filmi
             online</h1>
        <p class="subtitle">Hol nézhet filmi online? Egy mozitest minden esetben időigényes és farasztó keresésél indul, amelynek célja a megfelelő adatfőlyam-szolgáltató kiválasztása az adott filmekhez.</p>
    </header>

    <nav class="nav">
        <div class="nav-container">
            <div class="nav-section">
                <span class="nav-label">SZŰRÖK</span>
                <button class="nav-btn active">Összes</button>
                <button class="nav-btn">Filmek</button>
                <button class="nav-btn">Tévésorozatok</button>
            </div>
            <div class="nav-section">
                <span class="nav-label">Kategória</span>
                <select class="filter-select">
                    <option>A bemutatas éve ▼</option>
                    <option>2025</option>
                    <option>2024</option>
                    <option>2023</option>
                </select>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="film-grid" id="filmGrid">
            <!-- Filmek dinamikusan kerülnek ide -->
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
